<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sugar Sugar Camp 🐿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400;1,9..144,600&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FAF3E9;--cl:#FDF9F2;--cd:#F2E5D2;
  --cocoa:#2A1810;--cm:#735847;
  --ps:#F8DBE2;--pd:#C46C7E;
  --peach:#F0B080;--phs:#FBE3CD;
  --sage:#9DB089;--ss:#DDE6CE;
  --coral:#DD8470;--cs:#F5D5C9;
  --gold:#C9A24E;--gs:#EFE0B6;
  --ln:rgba(74,51,38,.13);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sarabun',sans-serif;color:var(--cocoa);background:var(--cream);
  background-image:radial-gradient(circle at 0% 0%,rgba(232,154,171,.18),transparent 45%),
    radial-gradient(circle at 100% 0%,rgba(240,176,128,.15),transparent 45%),
    radial-gradient(circle at 50% 100%,rgba(157,176,137,.10),transparent 55%);
  min-height:100vh;font-size:14px;line-height:1.6;}
.wrap{padding:28px 22px 80px;max-width:1280px;margin:0 auto;}
.brand{font-family:'Fraunces',serif;font-size:clamp(36px,7vw,70px);line-height:.92;letter-spacing:-.025em;font-weight:400;}
.brand em{color:var(--pd);font-style:italic;}
.brand .star{color:var(--gold);font-size:.55em;vertical-align:top;margin-left:4px;}
.tagline{font-family:'Fraunces',serif;font-style:italic;font-size:15px;color:var(--cm);margin-top:10px;}
.hrow{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:18px;margin-bottom:28px;}
.hright{display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
.datebox{background:var(--cl);border:1px solid var(--ln);border-radius:16px;padding:12px 18px;text-align:right;}
.datebox .dl{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--cm);}
.datebox .dv{font-family:'Fraunces',serif;font-style:italic;font-size:17px;margin-top:2px;}
.sbadge{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:999px;
  border:1px solid var(--ln);background:var(--cl);font-size:12px;cursor:pointer;
  font-family:inherit;color:var(--cocoa);transition:all .15s;}
.sbadge:hover{background:white;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--cm);display:inline-block;flex-shrink:0;}
.dot.synced{background:var(--sage);}
.dot.syncing{background:var(--gold);animation:blink 1.2s infinite;}
.dot.error{background:var(--coral);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.banner{background:linear-gradient(135deg,var(--gs),var(--phs));border:1px solid var(--gold);
  border-radius:16px;padding:14px 20px;display:flex;justify-content:space-between;
  align-items:center;gap:14px;margin-bottom:22px;flex-wrap:wrap;}
.booking-link-banner{
  background:linear-gradient(135deg,var(--ps),var(--phs));
  border:1px solid rgba(196,108,126,.3);
  border-radius:16px;padding:16px 22px;
  display:flex;justify-content:space-between;align-items:center;
  gap:14px;margin-bottom:22px;flex-wrap:wrap;}
.booking-link-banner .bl-left{display:flex;flex-direction:column;gap:3px;}
.booking-link-banner .bl-title{font-weight:600;font-size:14px;color:var(--cocoa);}
.booking-link-banner .bl-sub{font-size:12px;color:var(--cm);}
.booking-link-banner .bl-url{
  font-size:12px;color:var(--pd);font-style:italic;
  background:rgba(196,108,126,.1);padding:4px 10px;border-radius:8px;
  margin-top:4px;display:inline-block;max-width:320px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bl-actions{display:flex;gap:8px;flex-shrink:0;}
.btn-link{font-family:inherit;font-size:12.5px;font-weight:500;padding:9px 16px;
  border-radius:999px;border:1.5px solid var(--pd);cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;transition:all .18s;white-space:nowrap;}
.btn-link.primary{background:var(--pd);color:#fff;border-color:var(--pd);}
.btn-link.primary:hover{background:var(--cocoa);border-color:var(--cocoa);}
.btn-link.ghost{background:transparent;color:var(--pd);}
.btn-link.ghost:hover{background:rgba(196,108,126,.1);}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin:0 0 24px;}
.scard{background:var(--cl);border:1px solid var(--ln);border-radius:20px;padding:20px 22px 18px;
  position:relative;transition:transform .2s;}
.scard:hover{transform:translateY(-2px);}
.sico{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:18px;}
.sc-sage .sico{background:var(--ss);} .sc-coral .sico{background:var(--cs);}
.sc-gold .sico{background:var(--gs);} .sc-peach .sico{background:var(--phs);}
.scard .sl{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--cm);font-weight:600;}
.scard .sv{font-family:'Fraunces',serif;font-size:48px;font-weight:400;line-height:1;margin-top:8px;}
.scard .ss2{font-size:12px;color:var(--cm);margin-top:6px;}
.abar{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:20px;}
.tabs{display:flex;gap:4px;background:var(--cd);padding:4px;border-radius:999px;border:1px solid var(--ln);}
.tab{padding:9px 16px;border-radius:999px;font-size:13px;font-weight:500;cursor:pointer;
  border:none;background:transparent;color:var(--cm);font-family:inherit;transition:all .2s;}
.tab.active{background:var(--cocoa);color:var(--cl);}
.tab:hover:not(.active){color:var(--cocoa);}
.bgroup{display:flex;gap:8px;}
.btn{font-family:inherit;font-size:13.5px;font-weight:500;padding:10px 20px;border-radius:999px;
  border:none;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all .2s;white-space:nowrap;}
.btn-sm{padding:6px 14px;font-size:12px;}
.btn-p{background:var(--pd);color:#fff;} .btn-p:hover{background:var(--cocoa);}
.btn-s{background:var(--cd);color:var(--cocoa);} .btn-s:hover{background:var(--cl);}
.btn-g{background:transparent;color:var(--cm);} .btn-g:hover{background:var(--cd);color:var(--cocoa);}
.btn-d{background:var(--coral);color:#fff;} .btn-d:hover{background:#b85a47;}
.btn-o{background:transparent;border:1px solid var(--cocoa);color:var(--cocoa);}
.btn-o:hover{background:var(--cocoa);color:var(--cl);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.cage-bar{background:var(--cl);border:1px solid var(--ln);border-radius:18px;
  padding:14px 22px;margin-bottom:18px;display:flex;align-items:center;
  justify-content:space-between;gap:16px;flex-wrap:wrap;}
.cage-info{display:flex;align-items:center;gap:14px;}
.cage-label{font-size:12px;color:var(--cm);line-height:1.5;}
.cage-label b{color:var(--cocoa);font-size:13px;}
.cage-counter{display:flex;align-items:center;gap:0;border:1px solid var(--ln);
  border-radius:10px;overflow:hidden;background:var(--cream);}
.cage-btn{width:36px;height:36px;border:none;background:transparent;font-size:18px;
  cursor:pointer;font-family:inherit;color:var(--cocoa);transition:background .12s;
  display:flex;align-items:center;justify-content:center;}
.cage-btn:hover{background:var(--cd);}
.cage-btn:disabled{opacity:.3;cursor:not-allowed;}
.cage-num{min-width:48px;text-align:center;font-family:"Fraunces",serif;
  font-size:22px;font-weight:400;color:var(--cocoa);padding:0 4px;}
.cage-dots{display:flex;gap:3px;flex-wrap:wrap;max-width:320px;}
.cage-dot{width:16px;height:16px;border-radius:4px;display:inline-block;}
.cage-dot.main{background:var(--ss);border:1px solid var(--sage);}
.cage-dot.extra{background:rgba(201,162,78,.3);border:1px solid var(--gold);}
.sec{background:var(--cl);border:1px solid var(--ln);border-radius:24px;padding:26px 28px;margin-bottom:18px;}
.stitle{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;gap:16px;flex-wrap:wrap;}
.stitle h3{font-family:'Fraunces',serif;font-style:italic;font-size:24px;font-weight:400;}
.stitle .meta{font-size:13px;color:var(--cm);margin-top:4px;}
.dnav{display:flex;align-items:center;gap:6px;}
.di{border:1px solid var(--ln);background:var(--cream);font-family:inherit;font-size:13px;color:var(--cocoa);
  outline:none;padding:8px 12px;border-radius:999px;cursor:pointer;}
.di:focus{border-color:var(--pd);}
.nb{width:34px;height:34px;border-radius:50%;border:1px solid var(--ln);background:var(--cl);
  cursor:pointer;font-size:16px;transition:all .15s;}
.nb:hover{background:var(--cocoa);color:var(--cl);}
.legend{display:flex;gap:18px;font-size:12px;color:var(--cm);flex-wrap:wrap;align-items:center;
  margin-bottom:16px;padding-bottom:14px;border-bottom:1px dashed var(--ln);}
.li{display:flex;align-items:center;gap:6px;}
.ld{width:12px;height:12px;border-radius:4px;display:inline-block;}
.ld.sage{background:var(--ss);border:1px solid var(--sage);}
.ld.coral{background:var(--cs);border:1px solid var(--coral);}
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:10px;}
.rc{border-radius:16px;padding:12px;cursor:pointer;border:1.5px solid transparent;
  display:flex;flex-direction:column;justify-content:space-between;position:relative;
  text-align:left;font-family:inherit;color:inherit;transition:all .2s;aspect-ratio:1;}
.rc.av{background:var(--ss);border-color:rgba(157,176,137,.4);}
.rc.av:hover{background:var(--sage);color:#fff;transform:translateY(-2px);}
.rc.oc{background:var(--cs);border-color:rgba(221,132,112,.4);}
.rc.oc:hover{background:var(--coral);color:#fff;transform:translateY(-2px);}
.rc.suite{aspect-ratio:auto;height:110px;
  background:linear-gradient(135deg,var(--gs),var(--phs));border-color:var(--gold);}
.rc.suite.oc{background:linear-gradient(135deg,var(--cs),var(--ps));border-color:var(--coral);}
.rc.suite.av:hover{background:linear-gradient(135deg,var(--gold),var(--peach));color:#fff;}
.rc.suite.oc:hover{background:linear-gradient(135deg,var(--coral),var(--pd));color:#fff;}
.rnum{font-family:'Fraunces',serif;font-size:28px;font-weight:400;line-height:1;letter-spacing:-.02em;}
.rcr{font-size:10px;letter-spacing:.1em;text-transform:uppercase;opacity:.7;margin-top:2px;}
.rname{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rstat{font-size:11px;font-style:italic;opacity:.7;}
.calwrap{overflow-x:auto;padding-bottom:4px;}
.calgrid{display:grid;gap:2px;background:var(--cd);padding:2px;border-radius:14px;min-width:100%;}
.ccorner{background:var(--cocoa);color:var(--cl);padding:10px 12px;font-size:11px;
  letter-spacing:.1em;text-transform:uppercase;font-weight:600;}
.ch{background:var(--cl);padding:7px 4px;text-align:center;}
.ch.today{background:var(--gs);} .ch.wk{background:var(--cream);}
.ch .dn{font-family:'Fraunces',serif;font-size:16px;font-weight:400;}
.ch .dd{font-size:9px;color:var(--cm);text-transform:uppercase;letter-spacing:.05em;}
.crl{background:var(--cl);padding:0 10px;font-size:12px;font-weight:500;
  display:flex;align-items:center;gap:5px;height:36px;}
.crl.suite{background:linear-gradient(90deg,var(--gs),var(--cl));
  font-style:italic;font-family:'Fraunces',serif;font-size:13px;}
.cc{background:var(--cl);height:36px;border:none;cursor:pointer;position:relative;
  transition:background .12s;padding:0;font-family:inherit;}
.cc:hover{background:var(--cd);}
.cc.tc{background:rgba(201,162,78,.07);}
.cc.bk{background:var(--coral);} .cc.bk:hover{background:var(--pd);}
.cc.bk.s{border-radius:999px 4px 4px 999px;margin-left:3px;}
.cc.bk.e{border-radius:4px 999px 999px 4px;margin-right:3px;}
.cc.bk.s.e{border-radius:999px;margin:0 3px;}
.cctag{position:absolute;left:7px;top:50%;transform:translateY(-50%);
  font-size:10px;color:#fff;font-weight:500;white-space:nowrap;pointer-events:none;}
.frow{display:flex;gap:12px;align-items:center;margin-bottom:18px;flex-wrap:wrap;}
.sbox{flex:1;min-width:220px;display:flex;align-items:center;gap:8px;background:var(--cream);
  border:1px solid var(--ln);border-radius:999px;padding:9px 16px;color:var(--cm);}
.sbox:focus-within{border-color:var(--pd);background:#fff;}
.sbox input{flex:1;border:none;background:transparent;font-family:inherit;font-size:13.5px;outline:none;color:var(--cocoa);}
.pills{display:flex;gap:4px;flex-wrap:wrap;}
.pill{font-family:inherit;font-size:12px;padding:7px 14px;border-radius:999px;
  border:1px solid var(--ln);background:var(--cream);color:var(--cm);cursor:pointer;transition:all .12s;}
.pill.act{background:var(--cocoa);color:var(--cl);border-color:var(--cocoa);}
.blist{display:flex;flex-direction:column;gap:10px;}
.bc{background:var(--cream);border:1px solid var(--ln);border-radius:18px;padding:18px 20px;
  display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;transition:all .18s;}
.bc:hover{border-color:var(--pd);background:var(--cl);transform:translateY(-1px);}
.bc.past{opacity:.65;}
.bc.active{border-left:3px solid var(--sage);}
.bc.upcoming{border-left:3px solid var(--gold);}
.badge{width:62px;height:62px;border-radius:14px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:var(--phs);flex-shrink:0;}
.badge.suite{background:linear-gradient(135deg,var(--gs),var(--phs));}
.badge .bn{font-family:'Fraunces',serif;font-size:22px;font-weight:400;line-height:1;}
.badge .bt{font-size:8px;letter-spacing:.05em;opacity:.65;font-weight:600;margin-top:2px;}
.binfo h4{font-family:'Fraunces',serif;font-size:18px;font-weight:400;}
.bgl{color:var(--pd);font-style:italic;font-family:'Fraunces',serif;font-size:13px;margin:2px 0 6px;}
.bmeta{font-size:12px;color:var(--cm);display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.chip{display:inline-flex;align-items:center;gap:4px;}
.bacts{display:flex;gap:4px;}
.ib{width:34px;height:34px;border-radius:50%;border:1px solid transparent;background:var(--cd);
  cursor:pointer;font-size:14px;transition:all .12s;}
.ib:hover{background:var(--ps);color:var(--pd);}
.ib.danger:hover{background:var(--cs);color:var(--coral);}
.ib.confirm{background:var(--ss);color:var(--sage-d,#6B8A57);}
.ib.confirm:hover{background:var(--sage);color:#fff;}
.slip-overlay{position:fixed;inset:0;background:rgba(42,24,16,.55);backdrop-filter:blur(10px);
  z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.slip-wrap{max-width:420px;width:100%;animation:su .22s cubic-bezier(.34,1.56,.64,1);}
.slip-actions{display:flex;gap:10px;margin-top:14px;justify-content:center;}
.slip-btn{font-family:inherit;font-size:13px;font-weight:500;padding:11px 22px;
  border-radius:999px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:7px;
  transition:all .18s;white-space:nowrap;}
.slip-btn.dl{background:var(--pd);color:#fff;}
.slip-btn.dl:hover{background:var(--cocoa);}
.slip-btn.cl{background:var(--cd);color:var(--cocoa);}
.slip-btn.cl:hover{background:var(--cl);}
#slip-card{
  background:#FDF9F2;
  border-radius:20px;
  overflow:hidden;
  font-family:'Sarabun',sans-serif;
}
.slip-top{
  background:linear-gradient(135deg,#C46C7E 0%,#9B4D5F 100%);
  padding:24px 28px 20px;
  color:#fff;
  text-align:center;
}
.slip-top .s-brand{font-family:'Fraunces',serif;font-style:italic;font-size:26px;font-weight:400;letter-spacing:-.02em;}
.slip-top .s-tag{font-size:11px;letter-spacing:.22em;text-transform:uppercase;opacity:.8;margin-top:2px;}
.slip-top .s-icon{font-size:44px;margin:14px 0 6px;display:block;}
.slip-top .s-title{font-size:15px;font-weight:600;letter-spacing:.05em;opacity:.95;}
.slip-body{padding:22px 28px;}
.slip-ref{
  text-align:center;
  background:rgba(196,108,126,.1);
  border-radius:10px;
  padding:10px;
  margin-bottom:18px;
  font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#9B4D5F;font-weight:600;
}
.slip-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;
  border-bottom:1px dashed rgba(74,51,38,.12);gap:12px;}
.slip-row:last-of-type{border-bottom:none;}
.slip-lbl{font-size:11.5px;color:#735847;font-weight:500;letter-spacing:.04em;flex-shrink:0;}
.slip-val{font-size:13px;color:#2A1810;font-weight:600;text-align:right;}
.slip-val.big{font-family:'Fraunces',serif;font-size:18px;font-style:italic;}
.slip-footer{
  background:linear-gradient(135deg,#EFE0B6,#FBE3CD);
  border-top:1px solid rgba(196,108,126,.2);
  padding:16px 28px;
  text-align:center;
}
.slip-footer .sf-main{font-size:13px;color:#4A3326;font-weight:600;margin-bottom:3px;}
.slip-footer .sf-sub{font-size:11px;color:#735847;line-height:1.55;}
.slip-stamp{
  display:inline-flex;align-items:center;justify-content:center;
  width:60px;height:60px;border-radius:50%;
  border:3px solid #6B8A57;
  color:#6B8A57;
  font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  line-height:1.2;text-align:center;
  position:absolute;right:24px;bottom:16px;
  opacity:.85;
}
.bhead{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:2px;}
.stpill{display:inline-flex;align-items:center;font-size:11px;padding:3px 10px;
  border-radius:999px;font-weight:600;}
.st-u{background:var(--gs);color:#856B2A;} .st-a{background:var(--ss);color:#4F6938;}
.st-p{background:var(--cd);color:var(--cm);}
.overlay{position:fixed;inset:0;background:rgba(42,24,16,.45);backdrop-filter:blur(8px);
  z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;
  animation:fi .15s ease;}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{background:var(--cl);border-radius:24px;padding:28px;max-width:560px;width:100%;
  max-height:90vh;overflow-y:auto;position:relative;border:1px solid var(--ln);
  box-shadow:0 28px 56px rgba(42,24,16,.28);animation:su .2s cubic-bezier(.34,1.56,.64,1);}
.modal.lg{max-width:700px;}
@keyframes su{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h2{font-family:'Fraunces',serif;font-style:italic;font-size:28px;font-weight:400;margin-bottom:4px;}
.modal .msub{color:var(--cm);font-size:13px;margin-bottom:20px;}
.mclose{position:absolute;top:18px;right:18px;width:34px;height:34px;border-radius:50%;
  border:none;background:var(--cd);cursor:pointer;font-size:18px;}
.mclose:hover{background:var(--cs);color:var(--coral);}
.fg{margin-bottom:14px;}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fl{display:block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--cm);margin-bottom:6px;}
.fi{width:100%;padding:11px 14px;border:1px solid var(--ln);border-radius:12px;
  background:var(--cream);font-family:inherit;font-size:14px;color:var(--cocoa);outline:none;transition:all .15s;}
.fi:focus{border-color:var(--pd);background:#fff;box-shadow:0 0 0 3px rgba(196,108,126,.1);}
textarea.fi{resize:vertical;min-height:72px;}
.fhelp{font-size:11.5px;color:var(--cm);margin-top:5px;line-height:1.5;}
.rttog{display:grid;grid-template-columns:1fr 1fr;gap:5px;background:var(--cd);padding:4px;border-radius:14px;}
.rtbtn{padding:11px 12px;border:none;border-radius:10px;background:transparent;cursor:pointer;
  font-family:inherit;font-size:13px;font-weight:500;color:var(--cm);
  display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;}
.rtbtn.act{background:#fff;color:var(--cocoa);box-shadow:0 2px 8px rgba(74,51,38,.1);}
.rng{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;}
.rnb{aspect-ratio:1;border:1px solid var(--ln);border-radius:10px;background:var(--cream);cursor:pointer;
  font-family:'Fraunces',serif;font-size:14px;color:var(--cocoa);transition:all .1s;}
.rnb:hover:not(:disabled){border-color:var(--pd);background:#fff;}

<script>
'use strict';
// ============================
// T CODE (for copy)
// ============================
const AS_CODE = `/**
 * Sugar Sugar Camp - Google t (v6-lock)
 * Deploy -> New deployment -> Web app
 * Execute as: Me | Who has access: Anyone
 *
 * Schema: 12 columns (เพิ่ม "จำนวนน้อง" col 10)
 * sync ใช้ POST (ไม่มี URL limit) — รองรับข้อมูลจำนวนมาก
 * pull/ping ใช้ GET + JSONP — รองรับ file:// ด้วย
 */
const CALENDAR_NAME = 'Sugar Sugar Camp';
const SHEET_NAME    = 'Bookings';
const PENDING_SHEET = 'PendingBookings';
const TZ            = 'Asia/Bangkok';
const N_COLS        = 12;
const N_PCOLS       = 17;

// ─── CORS helper ───────────────────────────────────────
function corsOut(o) {
  return ContentService
    .createTextOutput(JSON.stringify(o))
    .setMimeType(ContentService.MimeType.JSON);
}

// ─── doGet : pull + ping + JSONP (รองรับ file://) ──────
function doGet(e) {
  const p   = e && e.parameter ? e.parameter : {};
  const act = p.action || 'ping';
  const cb  = p.callback || '';
  let result;
  try {
    if (act === 'pull') {
      result = { ok:true, bookings: readSheet() };
    } else if (act === 'sync' && p.data) {
      // fallback สำหรับ GET sync (data สั้น / file://)
      const bookings = JSON.parse(decodeURIComponent(p.data));
      result = { ok:true, ...syncAll(bookings) };
    } else if (act === 'send_line') {
      result = { ok:true, ...sendMorningLineSummary() };
    } else if (act === 'send_line_evening') {
      result = { ok:true, ...sendEveningLineSummary() };
    } else if (act === 'line_summary') {
      result = { ok:true, summary: dailySummary(), message: buildMorningMessage() };
    } else if (act === 'line_summary_evening') {
      const tom = addDay_(dateStr_(new Date()), 1);
      result = { ok:true, summary: summaryForDate(tom), message: buildEveningMessage() };
    } else if (act === 'pull_pending') {
      result = { ok:true, pending: readPending() };
    } else if (act === 'approve_pending') {
      result = approvePending(p.requestId, p);
    } else if (act === 'reject_pending') {
      result = rejectPending(p.requestId, p.reason || '');
    } else {
      result = { ok:true, msg:'Sugar Sugar Camp API ready', version:'v8-line-booking', schema:13 };
    }
  } catch(err) {
    result = { ok:false, error:String(err) };
  }
  const body   = JSON.stringify(result);
  const output = cb ? cb + '(' + body + ');' : body;
  const mime   = cb ? ContentService.MimeType.JAVASCRIPT : ContentService.MimeType.JSON;
  return ContentService.createTextOutput(output).setMimeType(mime);
}

// ─── doPost : sync หลัก + LINE Webhook (จับ User ID อัตโนมัติ) ─────────
function doPost(e) {
  try {
    const d = JSON.parse(e.postData.contents);

    // ★ LINE Webhook — มี events[] (ไม่มี action) → จับ userId อัตโนมัติ
    if (d.events && Array.isArray(d.events) && !d.action) {
      return handleLineWebhook(d);
    }

    if (d.action === 'sync') return corsOut({ ok:true, ...syncAll(d.bookings||[]) });
    if (d.action === 'pull') return corsOut({ ok:true, bookings: readSheet() });
    if (d.action === 'send_line') return corsOut({ ok:true, ...sendMorningLineSummary() });
    if (d.action === 'send_line_evening') return corsOut({ ok:true, ...sendEveningLineSummary() });
    if (d.action === 'line_summary') return corsOut({ ok:true, summary: dailySummary(), message: buildMorningMessage() });
    if (d.action === 'line_summary_evening') { const tom=addDay_(dateStr_(new Date()),1); return corsOut({ ok:true, summary: summaryForDate(tom), message: buildEveningMessage() }); }
    if (d.action === 'pull_pending') return corsOut({ ok:true, pending: readPending() });
    if (d.action === 'approve_pending') return corsOut(approvePending(d.requestId, d));
    if (d.action === 'reject_pending') return corsOut(rejectPending(d.requestId, d.reason || ''));
    return corsOut({ ok:false, error:'Unknown action' });
  } catch(err) {
    return corsOut({ ok:false, error:String(err) });
  }
}

// ─── LINE Webhook handler ───────────────────────────────────
// พอมีคนทักหา Bot (รายบุคคล) → บันทึก userId ลง LINE_TARGET_ID
// แล้วตอบกลับยืนยันใน LINE ทันที
function handleLineWebhook(body) {
  const props = PropertiesService.getScriptProperties();
  (body.events || []).forEach(function(ev) {
    const src = ev.source || {};
    var msgText = (ev.type === 'message' && ev.message && ev.message.type === 'text')
      ? String(ev.message.text || '') : '';
    var msgId = (ev.message && ev.message.id) ? String(ev.message.id) : '';

    // ── แชทกลุ่ม → เก็บ groupId + รับคำสั่งอนุมัติ/ปฏิเสธ ──
    if ((src.type === 'group' && src.groupId) || (src.type === 'room' && src.roomId)) {
      var gid = src.groupId || src.roomId;
      var firstTime = props.getProperty('LINE_GROUP_ID') !== gid;
      props.setProperty('LINE_GROUP_ID', gid);
      var gt = msgText.trim();
      if (gt.indexOf('อนุมัติ') === 0) { handleGroupApprove_(props, ev, gt, true);  return; }
      if (gt.indexOf('ปฏิเสธ')  === 0) { handleGroupApprove_(props, ev, gt, false); return; }
      if (firstTime && ev.replyToken) {
        replyLine_(props, ev.replyToken,
          '✅ ตั้งกลุ่มนี้เป็นกลุ่มรับ-อนุมัติการจองแล้วค่ะ 🐿\\nเมื่อมีคำขอจองเข้ามา ระบบจะแจ้งที่นี่พร้อมจัดห้องให้\\nพิมพ์ "อนุมัติ <โค้ด>" เพื่อยืนยัน · "ปฏิเสธ <โค้ด> [เหตุผล]" เพื่อปฏิเสธ');
      }
      return;
    }

    // ── แชทส่วนตัว (ลูกค้า) ──
    if (src.type === 'user' && src.userId) {
      props.setProperty('LINE_TARGET_ID', src.userId);

      // ข้อความ "จอง" ตามเทมเพลต → จัดห้องอัตโนมัติ + แจ้งกลุ่มให้อนุมัติ (ยังไม่ลงตารางจริง)
      if (isBookingText_(msgText)) {
        var ack = addPendingBooking_(props, src.userId, msgText, msgId);
        if (ev.replyToken) replyLine_(props, ev.replyToken, ack);
        return;
      }

      // ข้อความทั่วไป → บันทึกผู้รับแจ้งเตือน + แนะนำวิธีจอง
      if (ev.replyToken) {
        replyLine_(props, ev.replyToken,
          '✅ บันทึกผู้รับแจ้งเตือนเรียบร้อย!\\n🐿 Sugar Sugar Camp จะส่งสรุปให้คุณ\\n🌅 ทุกเช้า 06:00\\n🌆 ทุกเย็น 18:00\\n\\n📋 อยากจองที่พัก? พิมพ์ตามนี้ได้เลยค่ะ:\\n' + bookingTemplateText_() + '\\n\\n(User ID: ' + src.userId + ')');
      }
    }
  });
  // LINE ต้องการ HTTP 200 เสมอ
  return ContentService.createTextOutput(JSON.stringify({ ok:true }))
    .setMimeType(ContentService.MimeType.JSON);
}

// ─── ส่งข้อความ LINE ───────────────────────────────────────
function replyLine_(props, replyToken, text) {
  const token = props.getProperty('LINE_CHANNEL_ACCESS_TOKEN');
  if (!token) return;
  try {
    UrlFetchApp.fetch('https://api.line.me/v2/bot/message/reply', {
      method: 'post', contentType: 'application/json',
      headers: { Authorization: 'Bearer ' + token },
      payload: JSON.stringify({ replyToken: replyToken, messages: [{ type:'text', text: text }] }),
      muteHttpExceptions: true
    });
  } catch(_) {}
}
function pushLine_(userId, text) {
  const props = PropertiesService.getScriptProperties();
  const token = props.getProperty('LINE_CHANNEL_ACCESS_TOKEN');
  if (!token || !userId) return;
  try {
    UrlFetchApp.fetch('https://api.line.me/v2/bot/message/push', {
      method: 'post', contentType: 'application/json',
      headers: { Authorization: 'Bearer ' + token },
      payload: JSON.stringify({ to: userId, messages: [{ type:'text', text: text }] }),
      muteHttpExceptions: true
    });
  } catch(_) {}
}

// ─── เทมเพลตข้อความจอง ─────────────────────────────────────
function bookingTemplateText_() {
  return '#จอง\\nชื่อ: (ชื่อเจ้าของ)\\nเบอร์: 08xxxxxxxx\\nน้อง: (ชื่อน้อง)\\nจำนวน: 1\\nเข้า: 2026-07-01\\nออก: 2026-07-03\\nหมายเหตุ: -';
}
function isBookingText_(text) {
  if (!text) return false;
  var t = String(text).trim();
  return t.indexOf('#จอง') === 0 || t.indexOf('จอง') === 0;
}

// ─── แยกข้อมูลจากข้อความเทมเพลต (ไม่ใช้ AI — regex/แยกบรรทัด) ──
function parseBookingMessage_(text) {
  var out = { guestName:'', phone:'', gliderName:'', gliderCount:1, checkIn:'', checkOut:'', roomType:'standard', notes:'' };
  var lines = String(text).split('\\n');
  for (var i=0;i<lines.length;i++) {
    var ln = lines[i].replace('：',':');           // colon เต็มความกว้าง → ascii
    var ci = ln.indexOf(':');
    if (ci < 0) continue;
    var key = ln.slice(0,ci).trim().toLowerCase().replace('#','').replace(/\\s/g,'');
    var val = ln.slice(ci+1).trim();
    if (!val) continue;
    if (key==='ชื่อ'||key==='เจ้าของ'||key==='ชื่อเจ้าของ'||key==='name') out.guestName = val;
    else if (key==='เบอร์'||key==='โทร'||key==='เบอร์โทร'||key==='phone'||key==='tel') out.phone = val;
    else if (key==='น้อง'||key==='ชื่อน้อง'||key==='glider') out.gliderName = val;
    else if (key==='จำนวน'||key==='จำนวนน้อง'||key==='count'||key==='qty') { var n=parseInt(val,10); if(n>0) out.gliderCount=n; }
    else if (key==='เข้า'||key==='เช็คอิน'||key==='checkin'||key==='in') out.checkIn = parseDate_(val);
    else if (key==='ออก'||key==='เช็คเอาท์'||key==='checkout'||key==='out') out.checkOut = parseDate_(val);
    else if (key==='ห้อง'||key==='ประเภท'||key==='ประเภทห้อง'||key==='room') { var lv=val.toLowerCase(); out.roomType = (lv.indexOf('suite')>=0||lv.indexOf('grand')>=0||val.indexOf('แกรนด์')>=0||val.indexOf('สวีท')>=0)?'grand_suite':'standard'; }
    else if (key==='หมายเหตุ'||key==='โน้ต'||key==='note'||key==='notes'||key==='remark') out.notes = val;
  }
  return out;
}
function parseDate_(s) {
  s = String(s||'').trim();
  if (!s) return '';
  var parts, d, m, y;
  if (s.indexOf('/') >= 0) {
    parts = s.split('/');
    if (parts.length === 3) {
      d = parseInt(parts[0],10); m = parseInt(parts[1],10); y = parseInt(parts[2],10);
      if (y < 100) y += 2500;                       // ปี พ.ศ. ย่อ เช่น 69 → 2569
      if (y > 2400) y -= 543;                        // พ.ศ. → ค.ศ.
      if (d>0 && m>0 && y>0) return y + '-' + pad2_(m) + '-' + pad2_(d);
    }
    return '';
  }
  if (s.indexOf('-') >= 0) {
    parts = s.split('-');
    if (parts.length === 3 && parts[0].length === 4) {
      return parts[0] + '-' + pad2_(parts[1]) + '-' + pad2_(parts[2]);
    }
  }
  return '';
}
function pad2_(v){ v = String(parseInt(v,10)); return v.length<2 ? '0'+v : v; }
function normPhone_(p){ return String(p||'').replace(/[^0-9]/g, ''); }

// ─── จับคู่ระบบข้อมูลลูกค้า (ค้นจากการจองเดิมด้วยเบอร์) ──────
function findCustomerByPhone_(phone) {
  var target = normPhone_(phone);
  if (!target || target.length < 9) return null;
  var rows = readSheet();
  var matches = rows.filter(function(b){ return normPhone_(b.phone) === target; });
  if (!matches.length) return null;
  matches.sort(function(a,b){ return (b.checkIn||'').localeCompare(a.checkIn||''); });
  var latest = matches[0];
  return {
    guestName: latest.guestName || '',
    gliderName: latest.gliderName || '',
    gliderCount: Number(latest.gliderCount) || 1,
    count: matches.length
  };
}

// ─── คิวคำขอจอง (Pending) ──────────────────────────────────
function getPendingSheet_() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  let sh = ss.getSheetByName(PENDING_SHEET);
  const h = ['requestId','รับเมื่อ','LINE userId','messageId','ชื่อเจ้าของ',
    'ชื่อน้อง','จำนวนน้อง','เบอร์','ประเภทห้อง','เช็คอิน','เช็คเอาท์',
    'หมายเหตุ','สถานะ','ข้อความเดิม','ลูกค้าเดิม','เลขห้อง','โค้ดอนุมัติ'];
  if (!sh) {
    sh = ss.insertSheet(PENDING_SHEET);
    sh.getRange(1,1,1,h.length).setValues([h])
      .setFontWeight('bold').setBackground('#2A1810').setFontColor('#FAF3E9');
    sh.setFrozenRows(1);
  } else if (sh.getLastColumn() < h.length) {
    // อัพเกรด schema เก่า (เพิ่มคอลัมน์ เลขห้อง / โค้ดอนุมัติ)
    sh.getRange(1,1,1,h.length).setValues([h])
      .setFontWeight('bold').setBackground('#2A1810').setFontColor('#FAF3E9');
  }
  return sh;
}
function addPendingBooking_(props, userId, rawText, msgId) {
  var p = parseBookingMessage_(rawText);
  // เติมข้อมูลจากระบบลูกค้า (จับคู่ด้วยเบอร์)
  var matched = '';
  var prof = p.phone ? findCustomerByPhone_(p.phone) : null;
  if (prof) {
    if (!p.guestName) p.guestName = prof.guestName;
    if (!p.gliderName) p.gliderName = prof.gliderName;
    if ((!p.gliderCount || p.gliderCount === 1) && prof.gliderCount) p.gliderCount = prof.gliderCount;
    matched = 'ลูกค้าเดิม · เคยจอง ' + prof.count + ' ครั้ง';
  }
  if (p.checkIn && !p.checkOut) p.checkOut = addDay_(p.checkIn, 1);

  // ข้อมูลไม่ครบ → แนะนำเทมเพลต ไม่บันทึก
  if (!p.guestName || !p.checkIn) {
    return '⚠️ ข้อมูลยังไม่ครบค่ะ รบกวนพิมพ์ตามนี้นะคะ:\\n' + bookingTemplateText_();
  }

  // จัดห้องอัตโนมัติ
  var pick = autoPickRoom_(p.roomType, p.checkIn, p.checkOut);
  var assignedNo = pick ? pick.roomNumber : '';
  if (pick) p.roomType = pick.roomType;
  var roomLbl = pick ? (pick.roomType==='grand_suite' ? '👑 Grand Suite' : 'STD-'+pad2_(pick.roomNumber))
                     : '⚠ เต็มในช่วงนี้ (ทีมงานจัดห้องเอง)';

  const sh = getPendingSheet_();
  const lock = LockService.getScriptLock();
  lock.waitLock(20000);
  var code;
  try {
    // กัน LINE ส่ง webhook ซ้ำด้วย messageId
    if (msgId && sh.getLastRow() > 1) {
      var existing = sh.getRange(2,4,sh.getLastRow()-1,1).getValues();
      for (var i=0;i<existing.length;i++) {
        if (String(existing[i][0]) === msgId) {
          return '✅ รับคำขอจองแล้ว กำลังตรวจสอบกับทีมงานค่ะ 🐿';
        }
      }
    }
    var reqId = 'P' + Date.now() + Math.floor(Math.random()*1000);
    code = genApproveCode_(sh);
    var now = Utilities.formatDate(new Date(), TZ, 'yyyy-MM-dd HH:mm:ss');
    sh.appendRow([reqId, now, userId, msgId, p.guestName, p.gliderName, p.gliderCount,
      p.phone, p.roomType==='grand_suite'?'Grand Suite':'Standard',
      p.checkIn, p.checkOut, p.notes, 'pending', String(rawText), matched, assignedNo, code]);
    SpreadsheetApp.flush();
  } finally {
    lock.releaseLock();
  }

  // แจ้งกลุ่มให้อนุมัติ (พร้อมห้องที่จัดให้และโค้ด)
  var groupId = (props.getProperty('LINE_GROUP_ID') || '').trim();
  var nights = nightsBetween_(p.checkIn, p.checkOut);
  var groupMsg = '🆕 คำขอจองใหม่ #' + code + '\\n'
    + '━━━━━━━━━━━━\\n'
    + '👤 ' + p.guestName + '\\n'
    + (p.gliderName ? '🐿 น้อง ' + p.gliderName + ' (' + p.gliderCount + ' ตัว)\\n' : '🐿 ' + p.gliderCount + ' ตัว\\n')
    + '📅 ' + thDateShort_(p.checkIn) + ' → ' + thDateShort_(p.checkOut) + ' (' + nights + ' คืน)\\n'
    + '🏠 ห้องที่จัดให้: ' + roomLbl + '\\n'
    + (p.phone ? '📞 ' + p.phone + '\\n' : '')
    + (matched ? '🔁 ' + matched + '\\n' : '🆕 ลูกค้าใหม่\\n')
    + (p.notes ? '📝 ' + p.notes + '\\n' : '')
    + '━━━━━━━━━━━━\\n'
    + 'พิมพ์ "อนุมัติ ' + code + '" เพื่อยืนยัน\\n'
    + 'หรือ "ปฏิเสธ ' + code + ' [เหตุผล]"';
  if (groupId) pushLine_(groupId, groupMsg);

  // ตอบลูกค้าแบบสั้น (ยังไม่ใช่ใบจอง — รอกลุ่มอนุมัติ)
  return '✅ รับคำขอจองแล้วค่ะ 🐿\\nทีมงานกำลังตรวจสอบและจะแจ้งยืนยัน (ใบจอง) กลับให้นะคะ 🙏';
}
function readPending() {
  const sh = getPendingSheet_();
  if (sh.getLastRow() < 2) return [];
  return sh.getRange(2,1,sh.getLastRow()-1,N_PCOLS).getValues()
    .filter(function(r){ return r[0] && String(r[12]) === 'pending'; })
    .map(function(r){
      return {
        requestId:  String(r[0]),
        receivedAt: String(r[1]),
        lineUserId: String(r[2]||''),
        guestName:  String(r[4]||''),
        gliderName: String(r[5]||''),
        gliderCount:Number(r[6])||1,
        phone:      String(r[7]||''),
        roomType:   String(r[8])==='Grand Suite'?'grand_suite':'standard',
        roomNumber: Number(r[15])||0,
        checkIn:    fmtD(r[9]),
        checkOut:   fmtD(r[10]),
        notes:      String(r[11]||''),
        rawText:    String(r[13]||''),
        matched:    String(r[14]||''),
        code:       String(r[16]||'')
      };
    });
}
function setPendingStatus_(requestId, status) {
  const sh = getPendingSheet_();
  if (sh.getLastRow() < 2) return null;
  var ids = sh.getRange(2,1,sh.getLastRow()-1,1).getValues();
  for (var i=0;i<ids.length;i++) {
    if (String(ids[i][0]) === String(requestId)) {
      var row = i + 2;
      sh.getRange(row, 13).setValue(status);
      SpreadsheetApp.flush();
      return sh.getRange(row,1,1,N_PCOLS).getValues()[0];
    }
  }
  return null;
}
function approvePending(requestId, opts) {
  opts = opts || {};
  const r = setPendingStatus_(requestId, 'approved');
  if (!r) return { ok:false, error:'ไม่พบคำขอจองนี้' };
  var userId = String(r[2]||'');
  var booking = {
    guestName: String(r[4]||''), gliderName: String(r[5]||''), gliderCount: Number(r[6])||1,
    phone: String(r[7]||''),
    roomType: (opts.roomType || (String(r[8])==='Grand Suite'?'grand_suite':'standard')),
    roomNumber: Number(opts.roomNumber || r[15])||0,
    checkIn: fmtD(r[9]), checkOut: fmtD(r[10]), notes: String(r[11]||'')
  };
  var roomLbl = booking.roomType==='grand_suite' ? '👑 Grand Suite' : 'STD-'+pad2_(booking.roomNumber);
  if (userId) sendCustomerConfirmation_(userId, String(r[16]||''), booking, roomLbl);
  return { ok:true, requestId: String(requestId) };
}
function rejectPending(requestId, reason) {
  const r = setPendingStatus_(requestId, 'rejected');
  if (!r) return { ok:false, error:'ไม่พบคำขอจองนี้' };
  var userId = String(r[2]||'');
  var msg = '🙏 ขออภัยค่ะ คำขอจองของคุณยังไม่สามารถยืนยันได้'
    + (reason ? '\\nเหตุผล: ' + reason : '')
    + '\\nรบกวนติดต่อแอดมินเพื่อจัดการอีกครั้งนะคะ 🐿';
  if (userId) pushLine_(userId, msg);
  return { ok:true, requestId: String(requestId) };
}

// ─── จัดห้องอัตโนมัติ ──────────────────────────────────────
function getStdRooms_() {
  var v = parseInt(PropertiesService.getScriptProperties().getProperty('STD_ROOMS'), 10);
  return (v > 0) ? v : 23;   // ตั้ง STD_ROOMS ใน Script Properties เพื่อปรับจำนวนกรง Standard
}
function nightsBetween_(ci, co) {
  return Math.round((new Date(co+'T00:00:00+07:00') - new Date(ci+'T00:00:00+07:00')) / 86400000);
}
// ว่างไหม โดยดูเฉพาะการจองที่ "ยืนยันแล้ว" (ชีต Bookings)
function availConfirmed_(rt, rn, ci, co) {
  var rows = readSheet();
  return !rows.some(function(b){
    return b.roomType===rt && Number(b.roomNumber)===Number(rn) && !(co<=b.checkIn || ci>=b.checkOut);
  });
}
// ถูกจองไหม โดยนับทั้งที่ยืนยันแล้ว + คำขอที่ยังรออนุมัติ (กันจัดห้องชนกัน)
function roomTakenBy_(rt, rn, ci, co) {
  if (!availConfirmed_(rt, rn, ci, co)) return true;
  var sh = getPendingSheet_();
  if (sh.getLastRow() > 1) {
    var d = sh.getRange(2,1,sh.getLastRow()-1,N_PCOLS).getValues();
    for (var j=0;j<d.length;j++) {
      var r = d[j];
      if (String(r[12]) !== 'pending') continue;
      var prt = String(r[8])==='Grand Suite'?'grand_suite':'standard';
      var pci = fmtD(r[9]), pco = fmtD(r[10]);
      if (prt===rt && Number(r[15])===Number(rn) && pci && pco && !(co<=pci || ci>=pco)) return true;
    }
  }
  return false;
}
function autoPickRoom_(roomType, ci, co) {
  if (roomType === 'grand_suite') {
    return roomTakenBy_('grand_suite',1,ci,co) ? null : { roomType:'grand_suite', roomNumber:1 };
  }
  var n = getStdRooms_();
  for (var i=1;i<=n;i++) {
    if (!roomTakenBy_('standard',i,ci,co)) return { roomType:'standard', roomNumber:i };
  }
  return null;
}
// โค้ดอนุมัติ 4 หลัก ไม่ซ้ำกับคำขอที่ยัง pending
function genApproveCode_(sh) {
  var used = {};
  if (sh.getLastRow() > 1) {
    var codes = sh.getRange(2,17,sh.getLastRow()-1,1).getValues();
    var sts   = sh.getRange(2,13,sh.getLastRow()-1,1).getValues();
    for (var i=0;i<codes.length;i++) if (String(sts[i][0])==='pending') used[String(codes[i][0])] = true;
  }
  var code, tries=0;
  do { code = String(Math.floor(Math.random()*9000+1000)); tries++; } while (used[code] && tries<50);
  return code;
}

// ─── อนุมัติ/ปฏิเสธจากกลุ่ม LINE ───────────────────────────
function handleGroupApprove_(props, ev, text, isApprove) {
  var mt = text.match(/(\\d{3,6})/);
  var code = mt ? mt[1] : '';
  var sh = getPendingSheet_();
  if (sh.getLastRow() < 2) { if (ev.replyToken) replyLine_(props, ev.replyToken, 'ไม่มีคำขอที่รออนุมัติค่ะ'); return; }
  var data = sh.getRange(2,1,sh.getLastRow()-1,N_PCOLS).getValues();
  var rowIdx = -1;
  if (code) {
    for (var i=0;i<data.length;i++) {
      if (String(data[i][12])==='pending' && String(data[i][16])===code) { rowIdx=i; break; }
    }
  } else {
    var pend = [];
    for (var k=0;k<data.length;k++) if (String(data[k][12])==='pending') pend.push(k);
    if (pend.length === 1) rowIdx = pend[0];
    else { if (ev.replyToken) replyLine_(props, ev.replyToken, pend.length===0 ? 'ไม่มีคำขอที่รออนุมัติค่ะ' : 'มีหลายคำขอ — ระบุโค้ดด้วยค่ะ เช่น "อนุมัติ 1234"'); return; }
  }
  if (rowIdx < 0) { if (ev.replyToken) replyLine_(props, ev.replyToken, 'ไม่พบคำขอโค้ด ' + code + ' (อาจถูกดำเนินการไปแล้ว)'); return; }

  var r = data[rowIdx], row = rowIdx + 2;
  var userId = String(r[2]||'');
  var rcode  = String(r[16]||'');
  var booking = {
    guestName: String(r[4]||''), gliderName: String(r[5]||''), gliderCount: Number(r[6])||1,
    phone: String(r[7]||''), roomType: String(r[8])==='Grand Suite'?'grand_suite':'standard',
    roomNumber: Number(r[15])||0, checkIn: fmtD(r[9]), checkOut: fmtD(r[10]), notes: String(r[11]||'')
  };

  if (!isApprove) {
    sh.getRange(row,13).setValue('rejected'); SpreadsheetApp.flush();
    var reason = text.replace('ปฏิเสธ','').replace(code,'').trim();
    if (userId) pushLine_(userId, '🙏 ขออภัยค่ะ คำขอจอง #' + rcode + ' ยังไม่สามารถยืนยันได้'
      + (reason ? '\\nเหตุผล: ' + reason : '') + '\\nรบกวนติดต่อแอดมินอีกครั้งนะคะ 🐿');
    if (ev.replyToken) replyLine_(props, ev.replyToken, '❌ ปฏิเสธคำขอ #' + rcode + ' แล้ว · แจ้งลูกค้าทาง LINE แล้วค่ะ');
    return;
  }

  // อนุมัติ — ตรวจห้องอีกครั้ง (กันถูกจองแทรกระหว่างรอ)
  if (!booking.roomNumber || !availConfirmed_(booking.roomType, booking.roomNumber, booking.checkIn, booking.checkOut)) {
    var pick = autoPickRoom_(booking.roomType, booking.checkIn, booking.checkOut);
    if (!pick) { if (ev.replyToken) replyLine_(props, ev.replyToken, '⚠ ห้องเต็มในช่วงวันที่ขอ จัดห้องให้ไม่ได้ค่ะ (คำขอ #' + rcode + ')'); return; }
    booking.roomType = pick.roomType; booking.roomNumber = pick.roomNumber;
    sh.getRange(row,16).setValue(booking.roomNumber);
  }
  appendBooking_(booking);
  sh.getRange(row,13).setValue('approved'); SpreadsheetApp.flush();

  var roomLbl = booking.roomType==='grand_suite' ? '👑 Grand Suite' : 'STD-'+pad2_(booking.roomNumber);
  if (userId) sendCustomerConfirmation_(userId, rcode, booking, roomLbl);
  if (ev.replyToken) replyLine_(props, ev.replyToken,
    '✅ อนุมัติ #' + rcode + ' แล้ว · ห้อง ' + roomLbl + '\\nลงตารางจองและออกใบยืนยัน (รูป+การ์ด) ส่งให้ลูกค้าทาง LINE เรียบร้อยค่ะ 🐿');
}

// ─── ลงการจอง 1 รายการลงชีต Bookings + สร้าง Event ─────────
function appendBooking_(b) {
  var lock = LockService.getScriptLock();
  lock.waitLock(20000);
  try {
    var sh = getSheet(), cal = getCal();
    var gc = Number(b.gliderCount)||1;
    var title = (b.gliderName?'🐿 '+b.gliderName:'🐿 '+b.guestName)+' ('+gc+' ตัว) · '+
      (b.roomType==='grand_suite'?'Grand Suite':'STD-'+pad2_(b.roomNumber));
    var desc = ['เจ้าของ: '+b.guestName, b.gliderName?'น้อง: '+b.gliderName:'', 'จำนวน: '+gc+' ตัว',
      b.phone?'เบอร์: '+b.phone:'', b.notes?'บันทึก: '+b.notes:''].filter(function(x){return x;}).join('\\n');
    var s = new Date(b.checkIn+'T00:00:00+07:00');
    var e = new Date(b.checkOut+'T00:00:00+07:00');
    var ev = cal.createAllDayEvent(title, s, e, { description: desc });
    var now = Utilities.formatDate(new Date(), TZ, 'yyyy-MM-dd HH:mm:ss');
    var id = b.id || ('B' + Date.now() + Math.floor(Math.random()*1000));
    sh.appendRow([id, b.guestName||'', b.gliderName||'', b.phone||'',
      b.roomType==='grand_suite'?'Grand Suite':'Standard',
      b.roomNumber, b.checkIn, b.checkOut, b.notes||'', gc, ev.getId(), now]);
    SpreadsheetApp.flush();
    return id;
  } finally {
    lock.releaseLock();
  }
}

// ─── ใบจองส่งลูกค้า ────────────────────────────────────────
function buildSlip_(code, b, roomLbl) {
  var gc = Number(b.gliderCount)||1;

// ─── ส่งใบยืนยันให้ลูกค้า: รูป PNG (ดีไซน์เดิม) + การ์ด Flex ──
function sendCustomerConfirmation_(userId, code, b, roomLbl) {
  if (!userId) return;
  var messages = [];
  try {
    var imgUrl = makeSlipImageUrl_(code, b, roomLbl);
    if (imgUrl) messages.push({ type:'image', originalContentUrl: imgUrl, previewImageUrl: imgUrl });
  } catch(e) { /* สร้างรูปพลาด — ยังมีการ์ด Flex ส่งข้อมูลครบอยู่ */ }
  messages.push(buildSlipFlex_(code, b, roomLbl));
  pushMessages_(userId, messages);
}

function pushMessages_(to, messages) {
  var props = PropertiesService.getScriptProperties();
  var token = props.getProperty('LINE_CHANNEL_ACCESS_TOKEN');
  if (!token || !to || !messages.length) return;
  try {
    UrlFetchApp.fetch('https://api.line.me/v2/bot/message/push', {
      method:'post', contentType:'application/json',
      headers:{ Authorization:'Bearer ' + token },
      payload: JSON.stringify({ to: to, messages: messages }),
      muteHttpExceptions:true
    });
  } catch(_) {}
}

// ─── การ์ด Flex (หน้าตาเหมือนใบยืนยัน) ─────────────────────
function buildSlipFlex_(code, b, roomLbl) {
  var gc = Number(b.gliderCount)||1;
  var nights = nightsBetween_(b.checkIn, b.checkOut);
  function row(lbl, val) {
    return { type:'box', layout:'horizontal', margin:'md', contents:[
      { type:'text', text:lbl, size:'sm', color:'#9A8A7A', flex:4 },
      { type:'text', text:String(val), size:'sm', color:'#2A1810', weight:'bold', align:'end', flex:6, wrap:true }
    ]};
  }
  var rows = [ row('ชื่อเจ้าของ', b.guestName) ];
  if (b.gliderName) rows.push(row('ชื่อน้อง', b.gliderName + ' · ' + gc + ' ตัว'));
  else rows.push(row('จำนวน', gc + ' ตัว'));
  rows.push(row('ประเภทกรง', roomLbl));
  rows.push(row('เช็คอิน', thDateFull_(b.checkIn)));
  rows.push(row('เช็คเอาท์', thDateFull_(b.checkOut)));
  rows.push(row('ระยะเวลา', nights + ' คืน'));

  return {
    type:'flex',
    altText:'ใบยืนยันการจอง #' + code + ' · Sugar Sugar Camp 🐿',
    contents:{
      type:'bubble',
      header:{ type:'box', layout:'vertical', backgroundColor:'#B05C6E', paddingAll:'18px', contents:[
        { type:'text', text:'🐿 Sugar Sugar Camp', color:'#FFFFFF', size:'sm' },
        { type:'text', text:'ใบยืนยันการจองที่พัก', color:'#FFFFFF', size:'lg', weight:'bold', margin:'sm' },
        { type:'box', layout:'vertical', backgroundColor:'#FFFFFF22', cornerRadius:'20px', paddingAll:'6px', margin:'md', contents:[
          { type:'text', text:'เลขที่อ้างอิง #' + code, color:'#FFFFFF', size:'xs', align:'center', weight:'bold' }
        ]}
      ]},
      body:{ type:'box', layout:'vertical', paddingAll:'18px', contents: rows.concat([
        { type:'box', layout:'vertical', backgroundColor:'#EEF5E8', cornerRadius:'8px', paddingAll:'10px', margin:'lg', contents:[
          { type:'text', text:'✓ ยืนยันการจองแล้ว', color:'#557A3E', weight:'bold', size:'sm', align:'center' }
        ]}
      ])},
      footer:{ type:'box', layout:'vertical', paddingAll:'14px', contents:[
        { type:'text', text:'ดูแลด้วยความรักและใส่ใจทุกตัว 🌿', size:'xs', color:'#9A8A7A', align:'center', wrap:true },
        { type:'text', text:'ขอบคุณที่ใช้บริการค่ะ 💛', size:'xs', color:'#9A8A7A', align:'center', margin:'sm' }
      ]}
    }
  };
}

// ─── สร้างรูปใบยืนยัน (PNG) ด้วย Google Slides → คืน URL ────
// ต้องเปิด Advanced Service: Slides API (ในเอดิเตอร์ Apps Script)
function makeSlipImageUrl_(code, b, roomLbl) {
  var W = 480, H = 760;
  var created = Slides.Presentations.create({
    title: 'SSC-slip-' + code,
    pageSize: { width:{ magnitude:W, unit:'PT' }, height:{ magnitude:H, unit:'PT' } }
  });
  var pid = created.presentationId;
  var pres = SlidesApp.openById(pid);
  var slide = pres.getSlides()[0];
  slide.getBackground().setSolidFill('#FDF9F2');

  // แถบหัว (ชมพู)
  var hdr = slide.insertShape(SlidesApp.ShapeType.RECTANGLE, 0, 0, W, 150);
  hdr.getFill().setSolidFill('#B05C6E'); hdr.getBorder().setTransparent();
  slipText_(slide, 0, 24, W, 36, 'Sugar Sugar Camp', { size:24, color:'#FFFFFF', italic:true, font:'Playfair Display', align:'CENTER' });
  slipText_(slide, 0, 62, W, 16, 'ที่พักชูการ์ไกลเดอร์', { size:9, color:'#FFFFFF', align:'CENTER' });
  slipText_(slide, 0, 80, W, 38, '🐿', { size:26, color:'#FFFFFF', align:'CENTER' });
  slipText_(slide, 0, 118, W, 22, 'ใบยืนยันการจองที่พัก', { size:13, color:'#FFFFFF', bold:true, align:'CENTER' });

  // เลขที่อ้างอิง
  var refBox = slide.insertShape(SlidesApp.ShapeType.ROUND_RECTANGLE, 32, 170, W-64, 34);
  refBox.getFill().setSolidFill('#F6E7EA'); refBox.getBorder().setTransparent();
  slipText_(slide, 32, 177, W-64, 20, 'เลขที่อ้างอิง #' + code, { size:10, color:'#9B4D5F', bold:true, align:'CENTER' });

  // แถวข้อมูล
  var gc = Number(b.gliderCount)||1;
  var rows = [ ['ชื่อเจ้าของ', String(b.guestName||''), true] ];
  if (b.gliderName) rows.push(['ชื่อน้อง', String(b.gliderName), false]);
  rows.push(['จำนวน', gc + ' ตัว', false]);
  if (b.phone) rows.push(['เบอร์โทร', String(b.phone), false]);
  rows.push(['ประเภทกรง', roomLbl, false]);
  rows.push(['เช็คอิน', thDateFull_(b.checkIn), false]);
  rows.push(['เช็คเอาท์', thDateFull_(b.checkOut), false]);
  rows.push(['ระยะเวลา', nightsBetween_(b.checkIn, b.checkOut) + ' คืน', false]);

  var y = 224, rowH = 36;
  for (var i=0;i<rows.length;i++) {
    slipText_(slide, 32, y, 170, 22, rows[i][0], { size:10, color:'#735847', align:'START' });
    slipText_(slide, W-300, y-(rows[i][2]?3:0), 268, 26, rows[i][1],
      { size: rows[i][2]?16:12, color:'#2A1810', bold:true, italic:rows[i][2], font:rows[i][2]?'Playfair Display':null, align:'END' });
    if (i < rows.length-1) {
      var ln = slide.insertLine(SlidesApp.LineCategory.STRAIGHT, 32, y+28, W-32, y+28);
      ln.getLineFill().setSolidFill('#E6DDD0');
      ln.setWeight(1);
    }
    y += rowH;
  }

  // แถบท้าย
  var ftY = H - 96;
  var ft = slide.insertShape(SlidesApp.ShapeType.RECTANGLE, 0, ftY, W, 96);
  ft.getFill().setSolidFill('#F3E2C0'); ft.getBorder().setTransparent();
  slipText_(slide, 28, ftY+16, 300, 20, 'สถานะ: ยืนยันแล้ว', { size:12, color:'#4A3326', bold:true, align:'START' });
  slipText_(slide, 28, ftY+40, 320, 40, 'ออกใบยืนยัน: ' + thDateFull_(dateStr_(new Date())) + '\\nดูแลด้วยความรักและใส่ใจทุกตัว 🌿', { size:9, color:'#735847', align:'START' });
  var stamp = slide.insertShape(SlidesApp.ShapeType.ELLIPSE, W-92, ftY+18, 60, 60);
  stamp.getFill().setTransparent(); stamp.getBorder().getLineFill().setSolidFill('#6B8A57'); stamp.getBorder().setWeight(3);
  slipText_(stamp, 0, 0, 60, 60, 'ยืนยันแล้ว', { size:8, color:'#6B8A57', bold:true, align:'CENTER' });

  pres.saveAndClose();

  // ออกรูป PNG (thumbnail) แล้วนำไปฝากไว้บน Drive เป็นไฟล์สาธารณะ (ลิงก์เดารหัสไม่ได้)
  var thumb = Slides.Presentations.Pages.getThumbnail(pid, slide.getObjectId(),
    { 'thumbnailProperties.mimeType':'PNG', 'thumbnailProperties.thumbnailSize':'LARGE' });
  var blob = UrlFetchApp.fetch(thumb.contentUrl).getBlob().setName('SSC-slip-' + code + '.png');
  var folder = getSlipFolder_();
  var file = folder.createFile(blob);
  file.setSharing(DriveApp.Access.ANYONE_WITH_LINK, DriveApp.Permission.VIEW);
  try { DriveApp.getFileById(pid).setTrashed(true); } catch(_) {}   // ลบไฟล์ Slides ชั่วคราว
  return 'https://lh3.googleusercontent.com/d/' + file.getId();
}
function getSlipFolder_() {
  var name = 'SSC-Slips';
  var it = DriveApp.getFoldersByName(name);
  return it.hasNext() ? it.next() : DriveApp.createFolder(name);
}
function slipText_(parent, x, y, w, h, text, o) {
  o = o || {};
  var box = parent.insertTextBox(text, x, y, w, h);
  var tr = box.getText();
  var st = tr.getTextStyle();
  st.setForegroundColor(o.color || '#2A1810');
  st.setFontSize(o.size || 11);
  if (o.bold) st.setBold(true);
  if (o.italic) st.setItalic(true);
  if (o.font) { try { st.setFontFamily(o.font); } catch(_) {} }
  try {
    var al = o.align==='CENTER' ? SlidesApp.ParagraphAlignment.CENTER
           : o.align==='END'    ? SlidesApp.ParagraphAlignment.END
           : SlidesApp.ParagraphAlignment.START;
    tr.getParagraphs()[0].getRange().getParagraphStyle().setParagraphAlignment(al);
  } catch(_) {}
  try { box.getBorder().setTransparent(); } catch(_) {}
  return box;
}
function thDateFull_(dateStr) {
  var M = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  var p = String(dateStr).split('-');   // yyyy-mm-dd — parse ตรงๆ ไม่พึ่ง timezone
  var y = parseInt(p[0],10), mo = parseInt(p[1],10), da = parseInt(p[2],10);
  if (!y || !mo || !da) return String(dateStr);
  return da + ' ' + M[mo-1] + ' ' + (y+543);
}

function getSheet() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  let sh = ss.getSheetByName(SHEET_NAME);
  if (!sh) {
    sh = ss.insertSheet(SHEET_NAME);
    const h = [['ID','ชื่อเจ้าของ','ชื่อน้อง','เบอร์',
      'ประเภท','หมายเลขห้อง','เช็คอิน','เช็คเอาท์',
      'บันทึก','จำนวนน้อง','Calendar Event ID','Updated At']];
    sh.getRange(1,1,1,N_COLS).setValues(h)
      .setFontWeight('bold').setBackground('#2A1810').setFontColor('#FAF3E9');
    sh.setFrozenRows(1);
  } else {
    // อัพเกรด schema ถ้า sheet เก่ามี 11 cols
    const lastCol = sh.getLastColumn();
    if (lastCol === 11) {
      // แทรก col "จำนวนน้อง" ก่อน Calendar Event ID (col 10)
      sh.insertColumnBefore(10);
      sh.getRange(1,10).setValue('จำนวนน้อง')
        .setFontWeight('bold').setBackground('#2A1810').setFontColor('#FAF3E9');
      // ตั้งค่าเริ่มต้นเป็น 1 สำหรับ row ที่มีข้อมูล
      const lastRow = sh.getLastRow();
      if (lastRow > 1) {
        const range = sh.getRange(2,10,lastRow-1,1);
        const cur = range.getValues();
        const filled = cur.map(r => [r[0] || 1]);
        range.setValues(filled);
      }
    }
  }
  return sh;
}

function getCal() {
  const list = CalendarApp.getCalendarsByName(CALENDAR_NAME);
  if (list.length) return list[0];
  return CalendarApp.createCalendar(CALENDAR_NAME,{color:CalendarApp.Color.PALE_RED});
}

function fmtD(v) {
  if (!v) return '';
  if (v instanceof Date) return Utilities.formatDate(v,TZ,'yyyy-MM-dd');
  return String(v);
}

function readSheet() {
  const sh = getSheet();
  if (sh.getLastRow() < 2) return [];
  return sh.getRange(2,1,sh.getLastRow()-1,N_COLS).getValues()
    .filter(r=>r[0]).map(r=>({
      id: String(r[0]),
      guestName: String(r[1]||''),
      gliderName: String(r[2]||''),
      phone: String(r[3]||''),
      roomType: r[4]==='Grand Suite'?'grand_suite':'standard',
      roomNumber: Number(r[5])||1,
      checkIn: fmtD(r[6]),
      checkOut: fmtD(r[7]),
      notes: String(r[8]||''),
      gliderCount: Number(r[9])||1
    }));
}

function syncAll(bookings) {
  // กันหลายเครื่อง/หลายคนเขียนชนกัน — ทำให้ข้อมูลทับกันหาย
  const lock = LockService.getScriptLock();
  lock.waitLock(20000);
  try {
  const sh = getSheet(), cal = getCal();
  const evMap = {};
  if (sh.getLastRow()>1)
    sh.getRange(2,1,sh.getLastRow()-1,N_COLS).getValues()
      .forEach(r=>{ if(r[0]) evMap[String(r[0])]=String(r[10]||''); });

  const ids = new Set(bookings.map(b=>b.id));
  let del=0,cre=0,upd=0;
  Object.keys(evMap).forEach(id=>{
    if(!ids.has(id)&&evMap[id]){
      try{const e=cal.getEventById(evMap[id]);if(e){e.deleteEvent();del++;}}catch(_){}
    }
  });
  const now = Utilities.formatDate(new Date(),TZ,'yyyy-MM-dd HH:mm:ss');
  const rows = bookings.map(b=>{
    const gc = Number(b.gliderCount)||1;
    const title = (b.gliderName?'🐿 '+b.gliderName:'🐿 '+b.guestName)+' ('+gc+' ตัว) · '+
      (b.roomType==='grand_suite'?'Grand Suite':'STD-'+String(b.roomNumber).padStart(2,'0'));
    const desc = ['เจ้าของ: '+b.guestName,
      b.gliderName?'น้อง: '+b.gliderName:'',
      'จำนวน: '+gc+' ตัว',
      b.phone?'เบอร์: '+b.phone:'',
      b.notes?'บันทึก: '+b.notes:''].filter(Boolean).join('\\n');
    const s = new Date(b.checkIn+'T00:00:00+07:00');
    const e = new Date(b.checkOut+'T00:00:00+07:00');
    let eid = evMap[b.id]||'', ev=null;
    if(eid) try{ev=cal.getEventById(eid);}catch(_){ev=null;}
    if(ev){ev.setTitle(title);ev.setDescription(desc);ev.setAllDayDates(s,e);upd++;}
    else{ev=cal.createAllDayEvent(title,s,e,{description:desc});eid=ev.getId();cre++;}
    return [b.id,b.guestName||'',b.gliderName||'',b.phone||'',
      b.roomType==='grand_suite'?'Grand Suite':'Standard',
      b.roomNumber,b.checkIn,b.checkOut,b.notes||'',gc,eid,now];
  });
  if(sh.getLastRow()>1) sh.getRange(2,1,sh.getLastRow()-1,N_COLS).clearContent();
  if(rows.length) sh.getRange(2,1,rows.length,N_COLS).setValues(rows);
  SpreadsheetApp.flush();
  return {created:cre,updated:upd,deleted:del,total:bookings.length};
  } finally {
    lock.releaseLock();
  }
}

// ════════════════════════════════════════════════════════════
// LINE — แจ้งเตือน 2 รอบต่อวัน
// ────────────────────────────────────────────────────────────
//  🌅 06:00 — สรุปวันนี้ : เช็คอิน/เช็คเอาท์วันนี้
//  🌆 18:00 — แจ้งล่วงหน้า : พรุ่งนี้มีเข้า/ออกกี่บ้าน
//  (ทำงานบน Google Server — ไม่ต้องเปิดหน้า Dashboard ค้างไว้)
//
// ตั้งค่าครั้งเดียว:
//  1) สร้าง Messaging API channel ที่ https://developers.line.biz
//     แล้วคัดลอก "Channel access token (long-lived)"
//  2) ⚙ Project Settings > Script Properties เพิ่ม 2 ค่า:
//        LINE_CHANNEL_ACCESS_TOKEN = <channel access token>
//        LINE_TARGET_ID            = <userId/groupId ผู้รับ>
//        (เว้นว่าง LINE_TARGET_ID = broadcast ถึงผู้ติดตามทุกคน)
//  3) ตั้ง Time zone เป็น (GMT+07:00) Bangkok
//  4) รัน setupDailyLineTrigger() 1 ครั้ง → สร้าง 2 trigger อัตโนมัติ
//
//  ทดสอบ: รัน sendMorningLineSummary() หรือ sendEveningLineSummary()
// ════════════════════════════════════════════════════════════

// ── ยูทิลิตี้วันที่ ─────────────────────────────────────────
function dateStr_(d) {
  return Utilities.formatDate(d, TZ, 'yyyy-MM-dd');
}
function addDay_(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00+07:00');
  d.setDate(d.getDate() + n);
  return dateStr_(d);
}
function thDateShort_(dateStr) {
  const MS = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const d = new Date(dateStr + 'T00:00:00+07:00');
  return d.getDate() + ' ' + MS[d.getMonth()] + ' ' + String(d.getFullYear()+543).slice(2);
}
function nameOf_(b) {
  return (b.gliderName || b.guestName || 'ไม่ระบุ') +
    ' (' + (Number(b.gliderCount)||1) + ' ตัว · ' +
    (b.roomType==='grand_suite' ? 'Grand Suite' : 'STD-' + String(b.roomNumber).padStart(2,'0')) + ')';
}

// ── สรุปข้อมูลตามวันที่ ─────────────────────────────────────
function summaryForDate(targetDate) {
  const bs = readSheet();
  const isIn = b => targetDate >= b.checkIn && targetDate < b.checkOut;
  return {
    date:    targetDate,
    ci:      bs.filter(b => b.checkIn  === targetDate),
    co:      bs.filter(b => b.checkOut === targetDate),
    occ:     bs.filter(isIn),
    gliders: bs.filter(isIn).reduce((s,b) => s + (Number(b.gliderCount)||1), 0)
  };
}

function sendLine_(text) {
  const props  = PropertiesService.getScriptProperties();
  const token  = props.getProperty('LINE_CHANNEL_ACCESS_TOKEN');
  if (!token)  throw new Error('ยังไม่ได้ตั้งค่า LINE_CHANNEL_ACCESS_TOKEN ใน Script Properties');
  const target = (props.getProperty('LINE_TARGET_ID') || '').trim();
  const isPush = !!target;
  const url     = 'https://api.line.me/v2/bot/message/' + (isPush ? 'push' : 'broadcast');
  const payload = isPush
    ? { to: target, messages: [{ type:'text', text }] }
    : { messages: [{ type:'text', text }] };
  const res = UrlFetchApp.fetch(url, {
    method: 'post', contentType: 'application/json',
    headers: { Authorization: 'Bearer ' + token },
    payload: JSON.stringify(payload), muteHttpExceptions: true
  });
  const code = res.getResponseCode();
  if (code !== 200) throw new Error('LINE API ' + code + ': ' + res.getContentText());
  return { ok:true, sent: isPush ? 'push→' + target : 'broadcast' };
}

let syncT=null;

// buildUrl — ใช้สำหรับ GET เท่านั้น (pull / ping / JSONP)
function buildUrl(action, extraParams){
  let url = S.syncUrl + (S.syncUrl.includes('?')?'&':'?') + 'action='+action+'&_='+Date.now();
  if(extraParams) url += extraParams;
  return url;
}

// callAppsScript
//   sync  → POST fetch  (ไม่มี URL limit, รองรับข้อมูลเยอะ)
//   pull/ping → GET + JSONP (รองรับ file:// ด้วย)
function callAppsScript(action, bookings){
  // POST สำหรับ sync เมื่ออยู่บน https://
  if(action==='sync' && location.protocol !== 'file:'){
    return fetch(S.syncUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },  // text/plain หลีกเลี่ยง preflight
      body: JSON.stringify({ action:'sync', bookings: bookings||[] })
    })
    .then(r => r.json())
    .then(data => {
      if(data && data.ok) return data;
      throw new Error((data && data.error) || 'Apps Script ตอบกลับว่าล้มเหลว');
    })
    .catch(err => { throw new Error(err.message || 'POST sync ล้มเหลว'); });
  }

  // GET + JSONP สำหรับ pull / ping หรือ sync จาก file://
  return new Promise((res, rej) => {
    if(!S.syncUrl) return rej(new Error('ยังไม่ได้ตั้งค่า URL'));
    const cbName = 'ssc_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    // สำหรับ sync จาก file:// ยังคงใช้ GET (ข้อมูลน้อยกว่า limit เพราะใช้งานออฟไลน์)
    let url = buildUrl(action);
    if(action==='sync' && bookings){
      url += '&data=' + encodeURIComponent(JSON.stringify(bookings));
    }
    url += '&callback=' + cbName;
    const script = document.createElement('script');
    const timer = setTimeout(() => {
      cleanup();
      rej(new Error('หมดเวลา (20 วิ) — ตรวจสอบ URL และ Apps Script'));
    }, 20000);
    function cleanup(){
      try{ delete window[cbName]; }catch(_){}
      try{ script.remove(); }catch(_){}
      clearTimeout(timer);
    }
    window[cbName] = function(data){
      cleanup();
      if(data && data.ok) res(data);
      else rej(new Error((data && data.error) || 'Apps Script ตอบกลับว่าล้มเหลว'));
    };
    script.onerror = () => {
      cleanup();
      rej(new Error('เชื่อมต่อ Apps Script ไม่ได้ — ตรวจสอบ URL หรือ Deploy ใหม่'));
    };
    script.src = url;
    document.head.appendChild(script);
  });
}

// pushNow — ยิง sync ขึ้น Sheet พร้อม retry แบบ backoff
//   คืน true เมื่อสำเร็จ (เคลียร์ dirty), false เมื่อพยายามครบแล้วยังพลาด
async function pushNow(retries){
  if(!S.syncUrl) return false;
  const max = (typeof retries==='number') ? retries : 3;
  for(let attempt=1; attempt<=max; attempt++){
    try{
      await callAppsScript('sync', S.bookings);
      const now=Date.now(); localStorage.setItem(LS_T,String(now));
      S.syncSt='synced'; S.lastSync=now; S.syncErr=''; S.dirty=false;
      updateSyncBadge();
      return true;
    }catch(err){
      S.syncErr=err.message;
      if(attempt<max){
        // backoff: 0.8s, 1.6s, 2.4s …
        await new Promise(r=>setTimeout(r, attempt*800));
      }else{
        S.syncSt='error'; updateSyncBadge();
      }
    }
  }
  return false;
}

  // ★ ป้องกันข้อมูลหาย: ถ้ามีของค้างที่ยัง sync ไม่สำเร็จ ต้อง push ขึ้น Sheet ก่อน
  //   ถ้า push ไม่สำเร็จ → หยุดเลย ห้าม pull มาทับการจองที่ยังไม่ได้ขึ้น cloud
  if(S.dirty){

      return;
    }
  }

  S.syncSt='syncing'; updateSyncBadge();

  try{
    const d=await callAppsScript('pull', null);
    const rawIncoming = d.bookings||[];
    // ใช้ gliderCount จาก Sheet (Apps Script v5+); fallback = 1 เฉพาะกรณี undefined
    const incoming = rawIncoming.map(b => ({
      ...b,
      gliderCount: (b.gliderCount !== undefined && b.gliderCount !== null && parseInt(b.gliderCount) > 0)
                   ? parseInt(b.gliderCount)

    }));
    // กันเหนียวซ้ำ: ถ้า silent pull และ Sheet ว่างแต่เครื่องนี้มีข้อมูล → ไม่ทับ
    if(silent && S.bookings.length > 0 && incoming.length === 0){

    } else {

    if(!silent){ render(); toast('✗ '+err.message,'err'); }

  }
}

// callPending — GET + JSONP (ใช้ได้ทั้ง file:// และ https)
function callPending(action, extraParams){
  return new Promise((res, rej)=>{
    if(!S.syncUrl) return rej(new Error('ยังไม่ได้ตั้งค่า URL'));
    const cb = 'ssc_pcb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    let url = buildUrl(action, extraParams) + '&callback=' + cb;
    const script = document.createElement('script');
    const timer = setTimeout(()=>{ cleanup(); rej(new Error('หมดเวลา (20 วิ)')); }, 20000);
    function cleanup(){ try{delete window[cb];}catch(_){} try{script.remove();}catch(_){} clearTimeout(timer); }
    window[cb] = function(d){ cleanup(); (d&&d.ok) ? res(d) : rej(new Error((d&&d.error)||'ล้มเหลว')); };
    script.onerror = ()=>{ cleanup(); rej(new Error('เชื่อมต่อ Apps Script ไม่ได้')); };
    script.src = url;
    document.head.appendChild(script);
  });
}

function reviewPending(reqId){
  const r = S.pending.find(x=>x.requestId===reqId);
  if(!r){ toast('ไม่พบคำขอนี้แล้ว','err'); return; }
  openForm({
    roomType:r.roomType, roomNumber:r.roomNumber||null, checkIn:r.checkIn, checkOut:r.checkOut,
    guestName:r.guestName, gliderName:r.gliderName, gliderCount:r.gliderCount,
    phone:r.phone, notes:r.notes, pendingId:r.requestId
  });
}

// ปฏิเสธคำขอจอง
function rejectPendingUI(reqId){
  const r = S.pending.find(x=>x.requestId===reqId);
  if(!r) return;
  showModal(`<div class="modal" style="max-width:420px;" onclick="event.stopPropagation()">
    <button class="mclose" onclick="closeModal()">✕</button>
    <h2 style="font-size:22px;">ปฏิเสธคำขอจอง</h2>
    <p class="msub">ของ <b>${esc(r.guestName)}</b> · ${thD(r.checkIn,true)} – ${thD(r.checkOut,true)}</p>
    <div class="fg"><label class="fl">เหตุผล (จะส่งให้ลูกค้าทาง LINE)</label>
      <input id="rej-reason" class="fi" placeholder="เช่น ห้องเต็มในช่วงวันที่ขอ"></div>
    <div class="factions">
      <button class="btn btn-g" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-d" onclick="doRejectPending('${reqId}')">ยืนยันการปฏิเสธ</button>
    </div>
  </div>`);
}
async function doRejectPending(reqId){
  const reason = (document.getElementById('rej-reason')?.value||'').trim();
  closeModal();
  try{
    await callPending('reject_pending', '&requestId='+encodeURIComponent(reqId)+'&reason='+encodeURIComponent(reason));
    S.pending = S.pending.filter(x=>x.requestId!==reqId);
    render();
    toast('✓ ปฏิเสธคำขอแล้ว · แจ้งลูกค้าทาง LINE','ok');
  }catch(err){ toast('✗ '+err.message,'err'); }
}

// เรียกตอน approve สำเร็จ (จาก submitForm) — mark สถานะ + แจ้งลูกค้า
async function markPendingApproved(reqId, roomType, roomNumber){
  try{
    await callPending('approve_pending', '&requestId='+encodeURIComponent(reqId)
      +'&roomType='+encodeURIComponent(roomType||'')
      +'&roomNumber='+encodeURIComponent(roomNumber||''));
    S.pending = S.pending.filter(x=>x.requestId!==reqId);
  }catch(err){ /* ลงตารางสำเร็จแล้ว — แจ้งเตือนเฉยๆ */ toast('⚠ ลงตารางแล้ว แต่แจ้งลูกค้าไม่สำเร็จ: '+err.message,'err'); }
}

// TOAST
// ============================
let toastEl=null;
function toast(msg,kind='ok'){
  if(toastEl)toastEl.remove();
  toastEl=document.createElement('div');
  toastEl.className='toast '+kind; toastEl.textContent=msg;
  document.body.appendChild(toastEl);
  setTimeout(()=>{if(toastEl){toastEl.remove();toastEl=null;}},3200);
}

        </div>
        <div style="margin-top:8px;font-size:14px;">📅 ${thD(r.checkIn,true)} → ${thD(r.checkOut,true)} <span style="color:var(--cm);">· 🌙 ${nights} คืน</span></div>

        ${r.notes?`<div style="margin-top:6px;font-size:12.5px;color:var(--cm);white-space:pre-wrap;">📝 ${esc(r.notes)}</div>`:''}
        <details style="margin-top:8px;"><summary style="cursor:pointer;font-size:12px;color:var(--cm);">ดูข้อความต้นฉบับจาก LINE</summary>

function roomCell(rt,rn,isSuite){
  const b=roomOf(S.bookings,rt,rn,S.selDate);
  const oc=!!b;
  const cls='rc '+(oc?'oc':'av')+(isSuite?' suite':'');
  const num=isSuite?'GS':pad(rn);
  const lbl=isSuite?'GRAND SUITE':'STD-'+pad(rn);
  const cnt=b?(parseInt(b.gliderCount)||1):0;
  const nameDisp=b?(b.gliderName||b.guestName):'';

function renderCalendar(){
  const DAYS=14;
  const dates=[]; for(let i=0;i<DAYS;i++) dates.push(addDays(S.calStart,i));
  const today=todayKey();
  const allRooms=[{type:'grand_suite',num:1,label:'Grand Suite',isSuite:true}];
  for(let i=0;i<totalStd();i++) allRooms.push({type:'standard',num:i+1,label:'STD-'+pad(i+1),isSuite:false});

  let head='<div class="ccorner">ห้อง</div>';
  dates.forEach(d=>{
    const dt=parseD(d), isT=d===today, isWk=dt.getDay()===0||dt.getDay()===6;
    head+=`<div class="ch ${isT?'today':''} ${isWk?'wk':''}"><div class="dn">${dt.getDate()}</div><div class="dd">${TH_D[dt.getDay()]}</div></div>`;
  });

  let body='';
  allRooms.forEach(room=>{
    body+=`<div class="crl ${room.isSuite?'suite':''}">${room.isSuite?'👑 ':''}${room.label}</div>`;
    dates.forEach((d,di)=>{
      const b=roomOf(S.bookings,room.type,room.num,d);
      const prev=di>0?roomOf(S.bookings,room.type,room.num,dates[di-1]):null;
      const next=di<dates.length-1?roomOf(S.bookings,room.type,room.num,dates[di+1]):null;
      const isS=b&&(!prev||prev.id!==b.id), isE=b&&(!next||next.id!==b.id);
      let cls='cc'; if(b){cls+=' bk';if(isS)cls+=' s';if(isE)cls+=' e';} if(d===today)cls+=' tc';
      const tip=b?esc((b.gliderName||b.guestName)+' · 🐿 '+(parseInt(b.gliderCount)||1)+' ตัว · '+thD(b.checkIn,true)+' – '+thD(b.checkOut,true)):'ว่าง';
      body+=`<button class="${cls}" onclick="calClick('${room.type}',${room.num},'${d}')" title="${tip}">
        ${b&&isS?`<span class="cctag">${esc((b.gliderName||b.guestName).slice(0,8))}</span>`:''}
      </button>`;
    });
  });

  return `<div class="sec">
    <div class="stitle">
      <div>
        <h3>ปฏิทินห้องพัก</h3>
        <div class="meta">${thD(dates[0],true)} – ${thD(dates[DAYS-1],true)}</div>
      </div>
      <div class="dnav">
        <button class="nb" onclick="S.calStart=addDays(S.calStart,-7);render()">‹</button>
        <button class="btn btn-s btn-sm" onclick="S.calStart=todayKey();render()">วันนี้</button>
        <button class="nb" onclick="S.calStart=addDays(S.calStart,7);render()">›</button>
      </div>
    </div>
    <div class="calwrap">
      <div class="calgrid" style="grid-template-columns:130px repeat(${DAYS},minmax(42px,1fr));">
        ${head}${body}
      </div>
    </div>
  </div>`;
}

}

let FS={roomType:'standard',roomNumber:null,editId:''};

// ── ลูกค้าเดิม (returning customer) ─────────────────────
let CUST_MATCHES=[];

// รวมรายชื่อลูกค้าไม่ซ้ำจากการจองทั้งหมด — ใช้ค่าจากการจอง "ล่าสุด" ของแต่ละคน
// key: เบอร์โทร (ถ้ามี) ไม่งั้นใช้ชื่อ — กันชื่อซ้ำคนละคน/คนเดียวเปลี่ยนเบอร์
function getCustomerProfiles(){
  const map={};
  const sorted=[...S.bookings].sort((a,b)=>{
    const ka=a.createdAt||Date.parse(a.checkIn+'T00:00:00')||0;
    const kb=b.createdAt||Date.parse(b.checkIn+'T00:00:00')||0;
    return ka-kb; // เก่า→ใหม่ ให้ค่าล่าสุดทับค่าก่อนหน้า
  });
  sorted.forEach(b=>{
    const name=(b.guestName||'').trim();
    if(!name)return;
    const ph=(b.phone||'').trim();
    const key=ph?('p:'+ph):('n:'+name.toLowerCase());
    if(!map[key]) map[key]={name,phone:ph,gliderName:'',gliderCount:1,notes:'',count:0,lastDate:b.checkIn};
    const m=map[key];
    m.count++;
    m.name=name;
    if(ph) m.phone=ph;
    if(b.gliderName) m.gliderName=b.gliderName;
    if(b.gliderCount) m.gliderCount=parseInt(b.gliderCount)||m.gliderCount;
    if(b.notes) m.notes=b.notes;
    if(b.checkIn>(m.lastDate||'')) m.lastDate=b.checkIn;
  });
  return Object.values(map).sort((a,b)=>(b.lastDate||'').localeCompare(a.lastDate||''));
}

// แสดงรายการ suggestion ใต้ช่องชื่อเจ้าของ
function custSuggest(q){
  const box=document.getElementById('cust-suggest');
  if(!box)return;
  q=(q||'').toLowerCase().trim();
  if(q.length<1){ box.style.display='none'; box.innerHTML=''; return; }
  const all=getCustomerProfiles();
  const matches=all.filter(c=>
    c.name.toLowerCase().includes(q) || (c.phone||'').toLowerCase().includes(q)
  ).slice(0,6);
  CUST_MATCHES=matches;
  if(matches.length===0){ box.style.display='none'; box.innerHTML=''; return; }
  box.innerHTML='<div class="cust-suggest-head">🔁 ลูกค้าเดิม — แตะเพื่อเติมข้อมูล</div>'+
    matches.map((c,i)=>`
    <button type="button" class="cust-item" onmousedown="event.preventDefault();applyCust(${i})">
      <div class="cust-name">${esc(c.name)}${c.count>1?`<span class="cust-badge">เคยพัก ${c.count} ครั้ง</span>`:''}</div>
      <div class="cust-sub">${c.gliderName?'🐿 '+esc(c.gliderName)+' · ':''}${c.gliderCount} ตัว${c.phone?' · 📞 '+esc(c.phone):''}${c.lastDate?' · ล่าสุด '+thD(c.lastDate,true):''}</div>
    </button>`).join('');
  box.style.display='';
}

// เติมข้อมูลลูกค้าเดิมลงในฟอร์ม
function applyCust(i){
  const c=CUST_MATCHES[i]; if(!c)return;
  const g=document.getElementById('fg');   if(g)  g.value=c.name;
  const p=document.getElementById('fp');   if(p)  p.value=c.phone||'';
  const gl=document.getElementById('fgl'); if(gl) gl.value=c.gliderName||'';
  const n=document.getElementById('fn');   if(n)  n.value=c.notes||'';
  const cnt=document.getElementById('fcnt'), disp=document.getElementById('fcnt-display');
  const gc=parseInt(c.gliderCount)||1;
  if(cnt) cnt.value=gc;
  if(disp) disp.textContent=gc;
  const minus=document.getElementById('cnt-minus'); if(minus) minus.style.opacity=gc<=1?'0.3':'1';
  const box=document.getElementById('cust-suggest'); if(box){box.style.display='none';box.innerHTML='';}
  toast('✓ เติมข้อมูลลูกค้าเดิม: '+c.name,'ok');
}

function changeCount(delta){
  const el=document.getElementById('fcnt');
  const disp=document.getElementById('fcnt-display');
  const minus=document.getElementById('cnt-minus');
  if(!el||!disp)return;
  let v=parseInt(el.value||'1',10)+delta;
  if(v<1)v=1; if(v>20)v=20;
  el.value=v; disp.textContent=v;
  if(minus) minus.style.opacity=v<=1?'0.3':'1';
}

function switchRT(rt){
  FS.roomType=rt;
  FS.roomNumber=rt==='grand_suite'?1:null;
  document.getElementById('rt-s').className='rtbtn '+(rt==='standard'?'act':'');
  document.getElementById('rt-g').className='rtbtn '+(rt==='grand_suite'?'act':'');
  document.getElementById('rns').style.display=rt==='standard'?'':'none';
  document.getElementById('gs-sec').style.display=rt==='grand_suite'?'':'none';
  refreshAvail();
}

function selRoom(n){
  FS.roomNumber=n;
  document.querySelectorAll('.rnb').forEach(b=>b.classList.remove('sel'));
  const el=document.getElementById('rnb-'+n);
  if(el&&!el.disabled) el.classList.add('sel');
}

function onDates(){
  const ci=document.getElementById('fci')?.value;
  const co=document.getElementById('fco')?.value;
  if(!ci||!co)return;
  const n=co>ci?nts(ci,co):0;
  const el=document.getElementById('fnights');
  if(el){el.style.display=n>0?'':'none';el.textContent='🌙 '+n+' คืน · '+thD(ci,true)+' → '+thD(co,true);}
  refreshAvail();
}

function refreshAvail(){
  const ci=document.getElementById('fci')?.value;
  const co=document.getElementById('fco')?.value;
  if(!ci||!co)return;
  for(let n=1;n<=totalStd();n++){
    const btn=document.getElementById('rnb-'+n); if(!btn)continue;
    const av=isAvail(S.bookings,'standard',n,ci,co,FS.editId||null);
    btn.disabled=!av;
    if(!av&&FS.roomNumber===n){FS.roomNumber=null;btn.classList.remove('sel');}
  }
  const gs=document.getElementById('gs-sec');
  if(gs){
    const av=isAvail(S.bookings,'grand_suite',1,ci,co,FS.editId||null);
    const sp=gs.querySelector('.spick');
    if(sp){ sp.className='spick '+(av?'':'na');
      const dv=sp.querySelector('div>div:last-child');
      if(dv)dv.textContent=av?'ห้องว่างพร้อมรองรับ':'มีการจองในช่วงนี้แล้ว'; }
  }
}

function submitForm(){
  const gn=(document.getElementById('fg')?.value||'').trim();
  const gl=(document.getElementById('fgl')?.value||'').trim();
  const gc=parseInt(document.getElementById('fcnt')?.value||'1',10)||1;
  const ph=(document.getElementById('fp')?.value||'').trim();
  const no=(document.getElementById('fn')?.value||'').trim();
  const ci=document.getElementById('fci')?.value||'';
  const co=document.getElementById('fco')?.value||'';
  const err=t=>{ const e=document.getElementById('ferr'); if(e) e.innerHTML=`<div class="errbx">⚠ ${esc(t)}</div>`; };
  document.getElementById('ferr').innerHTML='';
  if(!gn) return err('กรุณาใส่ชื่อเจ้าของ');
  if(!FS.roomNumber) return err('กรุณาเลือกหมายเลขห้อง');
  if(co<=ci) return err('วันเช็คเอาท์ต้องอยู่หลังวันเช็คอิน');
  if(!isAvail(S.bookings,FS.roomType,FS.roomNumber,ci,co,FS.editId||null)) return err('ห้องนี้มีการจองในช่วงนี้แล้ว');
  const data={guestName:gn,gliderName:gl,gliderCount:gc,phone:ph,notes:no,
    roomType:FS.roomType,roomNumber:FS.roomNumber,checkIn:ci,checkOut:co};
  if(FS.editId) S.bookings=S.bookings.map(b=>b.id===FS.editId?{...b,...data}:b);
  else S.bookings=[...S.bookings,{...data,id:genId(),createdAt:Date.now()}];
  save(); closeModal(); autoSync();
  // ยืนยันจากคำขอจอง LINE → mark approved + แจ้งลูกค้ากลับ
  if(FS.pendingId){ const pid=FS.pendingId, prt=FS.roomType, prn=FS.roomNumber; FS.pendingId=''; markPendingApproved(pid,prt,prn).then(()=>{ render(); toast('✓ ลงตารางจองแล้ว · ส่งใบยืนยันลูกค้าทาง LINE','ok'); }); }
  render();
}

async function callLineAction(action, btnEl, btnLabel){
  if(btnEl){btnEl.disabled=true;btnEl.textContent='⏳ กำลังส่ง…';}
  if(!S.syncUrl){
    toast('⚠ ยังไม่ได้เชื่อมต่อ Apps Script — ไปตั้งค่าก่อน','err');
    openSettings();
    if(btnEl){btnEl.disabled=false;btnEl.innerHTML=btnLabel;}
    return;
  }
  try{
    if(location.protocol!=='file:'){
      const r=await fetch(S.syncUrl,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action})});
      const d=await r.json();
      if(!d.ok) throw new Error(d.error||'ส่งไม่สำเร็จ');
    } else {
      await new Promise((res,rej)=>{
        const cbName='ssc_cb_line_'+Date.now();
        const url=S.syncUrl+(S.syncUrl.includes('?')?'&':'?')+'action='+action+'&callback='+cbName+'&_='+Date.now();
        const script=document.createElement('script');
        const timer=setTimeout(()=>{cleanup();rej(new Error('หมดเวลา 20 วิ'));},20000);
        function cleanup(){try{delete window[cbName];}catch(_){}try{script.remove();}catch(_){}clearTimeout(timer);}
        window[cbName]=function(d){cleanup();if(d&&d.ok)res(d);else rej(new Error(d&&d.error||'ส่งไม่สำเร็จ'));};
        script.onerror=()=>{cleanup();rej(new Error('เชื่อมต่อ Apps Script ไม่ได้'));};
        script.src=url;document.head.appendChild(script);
      });
    }
    toast('✓ ส่งเข้า LINE สำเร็จ','ok');
    if(btnEl){btnEl.disabled=false;btnEl.innerHTML=btnLabel;}
  }catch(err){
    toast('✗ ส่ง LINE ไม่สำเร็จ: '+err.message,'err');
    if(btnEl){btnEl.disabled=false;btnEl.innerHTML=btnLabel;}
  }
}

const TH_M_FULL=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
function thFull(s){const d=parseD(s);return d.getDate()+' '+TH_M_FULL[d.getMonth()]+' '+(d.getFullYear()+543);}
function genRef(id){return'SSC-'+id.slice(-6).toUpperCase();}
function genQRDataUrl(text){
  const s=160,m=8,cs=6,ver=2;
  const c=document.createElement('canvas');c.width=s;c.height=s;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,s,s);
  ctx.fillStyle='#2A1810';
  const seed=text.split('').reduce((a,ch)=>a+ch.charCodeAt(0),0);
  const rnd=(i)=>((seed*9301+i*49297+233)%233280)/233280;
  const cells=21;const cell=Math.floor((s-m*2)/cells);
  for(let r=0;r<cells;r++)for(let cl2=0;cl2<cells;cl2++){
    const isCorner=(r<7&&cl2<7)||(r<7&&cl2>cells-8)||(r>cells-8&&cl2<7);
    if(isCorner){
      if((r===0||r===6||cl2===0||cl2===6)&&!((r>0&&r<6)&&(cl2>0&&cl2<6)))ctx.fillRect(m+cl2*cell,m+r*cell,cell,cell);
      else if(r>=2&&r<=4&&cl2>=2&&cl2<=4)ctx.fillRect(m+cl2*cell,m+r*cell,cell,cell);
    } else if(rnd(r*100+cl2)>0.48)ctx.fillRect(m+cl2*cell,m+r*cell,cell,cell);
  }
  return c.toDataURL();
}

const PRICE_PER_GLIDER_NIGHT = 90;

function formatDateTH(s){
